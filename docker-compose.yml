services:
  mysql:
    image: mysql:8.0
    container_name: portfolio-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: portfolio_manager
      MYSQL_USER: portfolio_user
      MYSQL_PASSWORD: changeme
      MYSQL_ROOT_PASSWORD: changeme_root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pchangeme_root"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
